<!DOCTYPE html>
<html lang="zh-Hant">
<head><meta charset="UTF-8"><title>Screenshot 03 — Photo OCR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1290px; height: 2796px; overflow: hidden; font-family: "Noto Sans TC", -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; }
  body {
    background: linear-gradient(180deg, #0B1438 0%, #050A24 100%);
    color: #fff;
    padding: 140px 100px 100px;
    display: flex; flex-direction: column;
  }
  .brand { font-size: 28px; font-weight: 500; letter-spacing: 0.2em; color: #5EE2D7; text-transform: uppercase; margin-bottom: 48px; }
  h1 { font-size: 120px; font-weight: 900; line-height: 1.0; letter-spacing: -0.03em; margin-bottom: 28px; }
  h1 .hl { color: #5EE2D7; }
  .sub { font-size: 40px; line-height: 1.4; color: #d2d2d7; margin-bottom: 80px; font-weight: 500; }

  .phone-mock {
    flex: 1;
    background: #000;
    border-radius: 72px;
    border: 12px solid #1a1a1a;
    box-shadow: 0 60px 120px rgba(0,0,0,0.6);
    overflow: hidden;
    position: relative;
  }
  .camera-view {
    width: 100%; height: 70%;
    background:
      linear-gradient(120deg, rgba(0,0,0,0.3) 0%, transparent 40%),
      repeating-linear-gradient(45deg, #1a1a1a 0px, #1a1a1a 4px, #222 4px, #222 8px),
      #0f0f0f;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .sign {
    background: #fff; color: #0B1438;
    padding: 60px 48px;
    border-radius: 20px;
    font-size: 88px; font-weight: 900;
    letter-spacing: 0.05em;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    transform: rotate(-3deg);
    position: relative;
  }
  .sign::before {
    content: "";
    position: absolute;
    inset: -8px;
    border: 4px solid #5EE2D7;
    border-radius: 24px;
    box-shadow: 0 0 0 8px rgba(94,226,215,0.2);
  }
  .sign span { color: #FF6B6B; }
  .result-sheet {
    background: rgba(255,255,255,0.98);
    border-radius: 48px 48px 0 0;
    padding: 60px 48px;
    height: 30%;
    display: flex; flex-direction: column; gap: 16px;
    color: #0B1438;
  }
  .result-sheet .label { font-size: 22px; color: #888; letter-spacing: 0.15em; }
  .result-sheet .src { font-size: 44px; font-weight: 700; color: #0B1438; }
  .result-sheet .arrow { font-size: 32px; color: #5EE2D7; }
  .result-sheet .dst { font-size: 52px; font-weight: 900; color: #0B1438; }
  .result-sheet .dst .accent { color: #FF6B6B; }

  .footer-tag { margin-top: 60px; font-size: 28px; color: #6e6e73; letter-spacing: 0.1em; text-align: center; }
</style>
</head>
<body>
  <div class="brand">03 · Photo / OCR</div>
  <h1>拍下，就<span class="hl">懂</span>。</h1>
  <div class="sub">Vision 框線辨識<br>路牌 · 菜單 · 說明書，一拍即譯</div>

  <div class="phone-mock">
    <div class="camera-view">
      <div class="sign">出口<br><span>EXIT</span></div>
    </div>
    <div class="result-sheet">
      <div class="label">DETECTED · JAPANESE</div>
      <div class="src">出口</div>
      <div class="arrow">↓</div>
      <div class="dst">Exit · <span class="accent">出口</span></div>
    </div>
  </div>

  <div class="footer-tag">@mina0717 · Made in Taiwan 🇹🇼</div>
</body>
</html>
