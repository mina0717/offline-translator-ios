name: OfflineTranslator
options:
  bundleIdPrefix: com.mina0717
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"  # 由 CI xcconfig 或 Xcode 自動填入
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    # v1.2.12 fix：版本號用樣板，讓 xcodebuild MARKETING_VERSION/CURRENT_PROJECT_VERSION 真的能 override
    MARKETING_VERSION: "1.2.12"
    CURRENT_PROJECT_VERSION: "1"
targets:
  OfflineTranslator:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - OfflineTranslator
    info:
      path: OfflineTranslator/Resources/Info.plist
      properties:
        CFBundleDisplayName: 離線翻譯
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: zh-Hant
        CFBundleLocalizations:
          - zh-Hant
          - en
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        UIUserInterfaceStyle: Automatic
        NSMicrophoneUsageDescription: 需要麥克風才能將你的語音辨識為文字並進行翻譯。
        NSSpeechRecognitionUsageDescription: 需要語音辨識功能以將錄裵的語音轉為文字。
        NSCameraUsageDescription: 需要相機才能拍照並辨識圖片中的文字以進行翻譯。
        NSPhotoLibraryUsageDescription: 若你要從相簿挑選照片進行翻譯，需要存取相簿。
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mina0717.offlinetranslator
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only for MVP
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - target: OfflineTranslatorShare
        embed: true
      - sdk: Translation.framework
      - sdk: Speech.framework
      - sdk: Vision.framework
      - sdk: AVFoundation.framework
  OfflineTranslatorShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - OfflineTranslatorShare
    info:
      path: OfflineTranslatorShare/Info.plist
      properties:
        CFBundleDisplayName: 離線翻譯
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: zh-Hant
        CFBundleLocalizations:
          - zh-Hant
          - en
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionPointIdentifier: com.apple.share-services
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mina0717.offlinetranslator.Share
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SKIP_INSTALL: YES
    dependencies:
      - sdk: Translation.framework
  OfflineTranslatorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - OfflineTranslatorTests
    dependencies:
      - target: OfflineTranslator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mina0717.offlinetranslator.tests
        GENERATE_INFOPLIST_FILE: YES
