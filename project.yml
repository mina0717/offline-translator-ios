name: OfflineTranslator
options:
  bundleIdPrefix: com.placeholder
  deploymentTarget:
    iOS: "17.4"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.4"
    DEVELOPMENT_TEAM: ""         # TODO: 填入你的 Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  OfflineTranslator:
    type: application
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - OfflineTranslator
    info:
      path: OfflineTranslator/Resources/Info.plist
      properties:
        CFBundleDisplayName: Offline Translator
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: zh-Hant
        CFBundleLocalizations:
          - zh-Hant
          - en
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleDefault
        UIUserInterfaceStyle: Automatic
        NSMicrophoneUsageDescription: 需要麥克風才能將你的語音辨識為文字並進行翻譯。
        NSSpeechRecognitionUsageDescription: 需要語音辨識功能以將錄裵的語音轉為文字。
        NSCameraUsageDescription: 需要相機才能拍照並辨識圖片中的文字以進行翻譯。
        NSPhotoLibraryUsageDescription: 若你要從相簿挑選照片進行翻譯，需要存取相簿。
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.OfflineTranslator
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only for MVP
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - target: OfflineTranslatorShare
        embed: true
  OfflineTranslatorShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - OfflineTranslatorShare
    info:
      path: OfflineTranslatorShare/Info.plist
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.OfflineTranslator.Share
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: OfflineTranslatorShare/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SKIP_INSTALL: YES
    dependencies:
      - sdk: Translation.framework
  OfflineTranslatorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - OfflineTranslatorTests
    dependencies:
      - target: OfflineTranslator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.placeholder.OfflineTranslatorTests
        GENERATE_INFOPLIST_FILE: YES
